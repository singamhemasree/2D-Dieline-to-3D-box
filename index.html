<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SIVI CHALLENGE - HEMASREE</title>
    <style>
        body { margin: 0; background: #111; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.85); padding: 20px; border: 1px solid #00ffcc; width: 280px; border-radius: 4px; }
        h2 { margin: 0; font-size: 18px; letter-spacing: 2px; }
        .sub { font-size: 10px; color: #666; margin-bottom: 15px; }
        input[type="range"] { width: 100%; margin: 15px 0; accent-color: #00ffcc; }
        .math-label { font-size: 11px; color: #00ffcc; background: #222; padding: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <h2>HEMASREE</h2>
    <div class="sub">CHALLENGE 01 / MAILER BOX</div>
    
    <label style="font-size: 11px;">UPLOAD DIELINE</label>
    <input type="file" id="uroller" style="display:block; margin-top:5px; font-size:10px;">

    <input type="range" id="foldScrub" min="0" max="1.5708" step="0.01" value="0">
    <div id="status">STATUS: 2D FLAT</div>
    
    <div class="math-label"><b>MATH MOVE:</b> Folding UPWARD on local axes using recursive pivots.</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. SCENE SETUP
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(5, 5, 5);
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    // 2. HEMASREE NAME TEXTURE
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#e5c4a3'; ctx.fillRect(0,0,512,512);
    ctx.fillStyle = '#333'; ctx.font = 'bold 50px Arial'; ctx.textAlign = 'center';
    ctx.fillText('HEMASREE', 256, 200);
    ctx.font = '25px Arial';
    ctx.fillText('DIELINE 2D -> 3D', 256, 250);
    const customTex = new THREE.CanvasTexture(canvas);

    // 3. THE "HINGE" COMPONENT (Correct Folding Logic)
    function createHinge(w, h, hasName = false) {
        const pivot = new THREE.Group();
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            side: THREE.DoubleSide,
            map: hasName ? customTex : null
        });
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), material);
        
        // Offset mesh so it rotates from the edge (crease line)
        mesh.position.y = h / 2; 
        pivot.add(mesh);
        
        return { pivot, mesh };
    }

    // 4. BUILDING THE MAILER BOX (ACCORDING TO YOUR IMAGE)
    const dieline = new THREE.Group();
    dieline.rotation.x = -Math.PI / 2; // Lay base flat
    scene.add(dieline);

    // BASE (Center)
    const base = new THREE.Mesh(new THREE.PlaneGeometry(3, 2.5), new THREE.MeshStandardMaterial({color: 0xd2b48c}));
    dieline.add(base);

    // BACK PANEL (Folds Upwards)
    const back = createHinge(3, 1.5);
    back.pivot.position.y = 1.25; // Connect to top of base
    base.add(back.pivot);

    // LID (Connects to Back, folds over top)
    const lid = createHinge(3, 2.5, true); // Has Hemasree name
    lid.pivot.position.y = 1.5;
    back.pivot.add(lid.pivot);

    // FRONT PANEL (Folds Upwards - FIXED)
    const front = createHinge(3, 1.5);
    front.pivot.position.y = -1.25; // Connect to bottom of base
    front.pivot.rotation.z = Math.PI; // Flip so it folds UPWARDS
    base.add(front.pivot);

    // LEFT PANEL (Folds Left to UP - FIXED)
    const left = createHinge(2.5, 1.5);
    left.pivot.position.x = -1.5; // Connect to left of base
    left.pivot.rotation.z = Math.PI / 2; // Point left
    base.add(left.pivot);

    // RIGHT PANEL (Folds Right to UP - FIXED)
    const right = createHinge(2.5, 1.5);
    right.pivot.position.x = 1.5; // Connect to right of base
    right.pivot.rotation.z = -Math.PI / 2; // Point right
    base.add(right.pivot);

    // 5. ANIMATION & UPLOAD
    const slider = document.getElementById('foldScrub');
    const status = document.getElementById('status');

    function animate() {
        requestAnimationFrame(animate);
        const a = parseFloat(slider.value);

        // Fold everything UP to 90 degrees
        back.pivot.rotation.x = a;
        lid.pivot.rotation.x = a;
        front.pivot.rotation.x = a;
        left.pivot.rotation.x = a;
        right.pivot.rotation.x = a;

        status.innerText = a > 1.4 ? "BOX CLOSED" : a < 0.1 ? "2D FLAT" : "FOLDING UP...";
        renderer.render(scene, camera);
    }

    // Upload functionality
    document.getElementById('uroller').onchange = (e) => {
        const file = e.target.files[0];
        const url = URL.createObjectURL(file);
        new THREE.TextureLoader().load(url, (t) => {
            scene.traverse(obj => { if(obj.isMesh) obj.material.map = t; });
        });
    };

    animate();
</script>
</body>
</html>
