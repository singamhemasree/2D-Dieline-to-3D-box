<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sivi Challenge 01 - 3D Box</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; z-index: 10; padding: 20px; width: 300px; background: rgba(0,0,0,0.7); }
        canvas { display: block; }
        input { width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui">
    <h3>SIVI CHALLENGE 01</h3>
    <label>1. Upload Dieline (PNG/JPG)</label>
    <input type="file" id="upload" accept="image/*">
    <br><br>
    <label>2. Fold Animation</label>
    <input type="range" id="foldRange" min="0" max="1.57" step="0.01" value="0">
    <p>Fold the Box (0 - 90°)</p>
</div>

<!-- Load Three.js from CDN -->
<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Light
    const light = new THREE.DirectionalLight(0xffffff, 3);
    light.position.set(5, 10, 7.5);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

    camera.position.set(4, 4, 6);
    camera.lookAt(0, 0, 0);

    // --- THE MATH MOVE: HINGE LOGIC ---
    // Function to create a panel that rotates from its edge
    function createPanel(w, h, color = 0xd2b48c) {
        const group = new THREE.Group(); // The Hinge
        const geometry = new THREE.PlaneGeometry(w, h);
        const material = new THREE.MeshStandardMaterial({ color, side: THREE.DoubleSide });
        const mesh = new THREE.Mesh(geometry, material);
        
        // Pivot Move: Shift mesh so its edge is at the group's center
        mesh.position.y = h / 2; 
        group.add(mesh);
        
        return { group, mesh };
    }

    // --- BUILD THE MAILER BOX (Image Hierarchy) ---
    const root = new THREE.Group(); // Center of the world
    scene.add(root);

    // 1. Base (The center panel)
    const base = new THREE.Mesh(new THREE.PlaneGeometry(3, 2.5), new THREE.MeshStandardMaterial({ color: 0x8b5e3c }));
    base.rotation.x = -Math.PI / 2;
    root.add(base);

    // 2. Back Wall (Child of Base)
    const back = createPanel(3, 1.5);
    back.group.position.y = 1.25; // edge of base
    base.add(back.group);

    // 3. Lid (Child of Back Wall)
    const lid = createPanel(3, 2.5);
    lid.group.position.y = 1.5; 
    back.group.add(lid.group);

    // 4. Front Tuck (Child of Lid)
    const tuck = createPanel(3, 0.6);
    tuck.group.position.y = 2.5;
    lid.group.add(tuck.group);

    // 5. Front Wall (Attached to other side of base)
    const front = createPanel(3, 1.5);
    front.group.position.y = -1.25;
    front.group.rotation.z = Math.PI; // Flip to face forward
    base.add(front.group);

    // 6. Side Walls
    const left = createPanel(2.5, 1.5);
    left.group.position.x = -1.5;
    left.group.rotation.z = Math.PI / 2;
    base.add(left.group);

    const right = createPanel(2.5, 1.5);
    right.group.position.x = 1.5;
    right.group.rotation.z = -Math.PI / 2;
    base.add(right.group);

    // --- INTERACTION ---
    const slider = document.getElementById('foldRange');
    const uploadInput = document.getElementById('upload');

    // Folder Animation Loop
    function animate() {
        requestAnimationFrame(animate);
        const angle = parseFloat(slider.value);

        // Fold the chain
        back.group.rotation.x = angle;
        lid.group.rotation.x = angle;
        tuck.group.rotation.x = angle * 0.5; // Slight angle for the tuck
        front.group.rotation.x = angle;
        left.group.rotation.x = angle;
        right.group.rotation.x = angle;

        // Slow auto-rotation for the whole scene
        root.rotation.y += 0.005;

        renderer.render(scene, camera);
    }

    // Handle Texture Upload
    uploadInput.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            const loader = new THREE.TextureLoader();
            const texture = loader.load(event.target.result);
            // Apply to all meshes
            scene.traverse(obj => {
                if(obj.isMesh) obj.material.map = texture;
            });
        };
        reader.readAsDataURL(file);
    };

    animate();

    // Resize handling
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
