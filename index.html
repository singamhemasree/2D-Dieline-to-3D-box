<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hemasree - Fixed 3D Folding</title>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.9); padding: 20px; border: 1px solid #00ffcc; width: 280px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00ffcc; margin: 15px 0; }
        .label { font-size: 10px; text-transform: uppercase; color: #888; }
        h2 { margin: 0; font-size: 18px; }
    </style>
</head>
<body>

<div id="ui">
    <h2>HEMASREE</h2>
    <div class="label">SIVI CHALLENGE 01</div>
    
    <div class="label" style="margin-top:20px;">Upload Dieline</div>
    <input type="file" id="uroller" accept="image/*">
    
    <div class="label" style="margin-top:20px;">Fold Animation (Upward)</div>
    <input type="range" id="folder" min="0" max="1.5708" step="0.01" value="0">
    <div id="status">FLAT</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(5, 5, 5);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const light = new THREE.PointLight(0xffffff, 100);
    light.position.set(5, 10, 5);
    scene.add(light);

    // --- CUSTOM TEXTURE FOR HEMASREE ---
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#f0f0f0'; ctx.fillRect(0,0,512,512);
    ctx.fillStyle = '#000'; ctx.font = 'bold 60px Arial'; ctx.textAlign = 'center';
    ctx.fillText('HEMASREE', 256, 256);
    const boxTex = new THREE.CanvasTexture(canvas);

    // --- THE FIX: UNIVERSAL HINGE FUNCTION ---
    function createPanel(w, h, nameOnIt = false) {
        const hinge = new THREE.Group();
        const mesh = new THREE.Mesh(
            new THREE.PlaneGeometry(w, h),
            new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, map: nameOnIt ? boxTex : null })
        );
        mesh.position.y = h / 2; // Offset mesh so the hinge point is exactly at the edge
        hinge.add(mesh);
        return { hinge, mesh };
    }

    // --- ASSEMBLY ---
    const base = new THREE.Mesh(new THREE.PlaneGeometry(3, 2), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
    base.rotation.x = -Math.PI / 2; // Flat on floor
    scene.add(base);

    // 1. BACK PANEL (Top edge) -> Folds UP
    const back = createPanel(3, 1.5);
    back.hinge.position.y = 1; 
    base.add(back.hinge);

    // 2. LID (Attached to Back) -> Folds UP
    const lid = createPanel(3, 2, true); // Stamped Hemasree
    lid.hinge.position.y = 1.5;
    back.hinge.add(lid.hinge);

    // 3. FRONT PANEL (Bottom edge) -> Folds UP
    const front = createPanel(3, 1.5);
    front.hinge.position.y = -1;
    front.hinge.rotation.z = Math.PI; // Flip orientation so it folds toward center
    base.add(front.hinge);

    // 4. LEFT PANEL (Left edge) -> Folds UP
    const left = createPanel(2, 1.5);
    left.hinge.position.x = -1.5;
    left.hinge.rotation.z = Math.PI / 2; // Pointing left
    base.add(left.hinge);

    // 5. RIGHT PANEL (Right edge) -> Folds UP
    const right = createPanel(2, 1.5);
    right.hinge.position.x = 1.5;
    right.hinge.rotation.z = -Math.PI / 2; // Pointing right
    base.add(right.hinge);

    // --- ANIMATION ---
    const slider = document.getElementById('folder');
    const status = document.getElementById('status');

    function render() {
        requestAnimationFrame(render);
        const a = parseFloat(slider.value);

        // All panels fold UP by 90 degrees (1.57 radians)
        back.hinge.rotation.x = a;    // Back folds up
        lid.hinge.rotation.x = a;     // Lid folds over
        front.hinge.rotation.x = a;   // Front folds up
        left.hinge.rotation.x = a;    // Left folds up
        right.hinge.rotation.x = a;   // Right folds up

        status.innerText = a > 1.4 ? "CLOSED" : a < 0.1 ? "FLAT" : "FOLDING UP...";
        renderer.render(scene, camera);
    }

    // Handle Upload
    document.getElementById('uroller').onchange = (e) => {
        const file = e.target.files[0];
        const url = URL.createObjectURL(file);
        new THREE.TextureLoader().load(url, (t) => {
            scene.traverse(o => { if(o.isMesh) o.material.map = t; });
        });
    };

    render();
</script>
</body>
</html>
