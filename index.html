<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Hemasree Box - Dieline to 3D</title>
<style>
  body { margin: 0; overflow: hidden; background: #f5f5f0; font-family: sans-serif; }
  #ui {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 14px; z-index: 10;
  }
  button {
    padding: 12px 24px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px;
    cursor: pointer; color: white; box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  }
  #openBtn { background: #e74c3c; }
  #closeBtn { background: #27ae60; }
  #resetBtn { background: #2980b9; }
  button:hover { filter: brightness(1.1); }
</style>
</head>
<body>

<div id="ui">
  <button id="openBtn">Open</button>
  <button id="closeBtn">Close</button>
  <button id="resetBtn">Reset</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f0);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 8, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.55);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

const outerMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.FrontSide });
const innerMat = new THREE.MeshStandardMaterial({ color: 0xf0e6da, side: THREE.FrontSide });

function makeLabelTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, 512, 512);
  ctx.fillStyle = "#333333";
  ctx.font = "bold 56px Georgia";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Hemasree", 256, 256);
  return new THREE.CanvasTexture(canvas);
}
const labelMat = new THREE.MeshStandardMaterial({ map: makeLabelTexture(), side: THREE.FrontSide });

const W = 3.2, D = 3.2;   // bottom footprint (center square)
const H = 1.4;            // side wall height
const flapH = 1.1;        // front/back rounded flap height

// ---- bottom (fixed, root) ----
const bottom = new THREE.Mesh(new THREE.PlaneGeometry(W, D), outerMat);
bottom.rotation.x = -Math.PI / 2;
scene.add(bottom);

// ---- rounded flap shape for front/back (matches the rounded-corner cut lines) ----
function roundedFlapShape(width, height, r) {
  const shape = new THREE.Shape();
  const hw = width / 2;
  shape.moveTo(-hw, 0);
  shape.lineTo(-hw, height - r);
  shape.quadraticCurveTo(-hw, height, -hw + r, height);
  shape.lineTo(hw - r, height);
  shape.quadraticCurveTo(hw, height, hw, height - r);
  shape.lineTo(hw, 0);
  shape.lineTo(-hw, 0);
  return shape;
}

// ---- simple side wall shape with small tab notches (visual only, doesn't affect fold) ----
function sideWallShape(width, height) {
  const shape = new THREE.Shape();
  const hw = width / 2;
  shape.moveTo(-hw, 0);
  shape.lineTo(-hw, height);
  shape.lineTo(hw, height);
  shape.lineTo(hw, 0);
  shape.lineTo(-hw, 0);
  return shape;
}

// wall builder: outerGroup = static placement, foldGroup = the hinge that animates
function makeWall(shapeFn, width, height, edgePos, staticYRotation, useLabel) {
  const outerGroup = new THREE.Group();
  outerGroup.position.copy(edgePos);
  outerGroup.rotation.y = staticYRotation;
  scene.add(outerGroup);

  const foldGroup = new THREE.Group();
  outerGroup.add(foldGroup);

  const shape = shapeFn(width, height);
  const outerGeo = new THREE.ShapeGeometry(shape);
  const outerMesh = new THREE.Mesh(outerGeo, useLabel ? labelMat : outerMat);
  outerMesh.rotation.x = Math.PI / 2;

  const innerGeo = new THREE.ShapeGeometry(shape);
  innerGeo.translate(0, 0, 0.01);
  const innerMesh = new THREE.Mesh(innerGeo, innerMat);
  innerMesh.rotation.x = Math.PI / 2;
  innerMesh.rotation.z = Math.PI;

  foldGroup.add(outerMesh);
  foldGroup.add(innerMesh);

  return { foldGroup };
}

// front/back use the rounded flap shape; left/right use the simple side shape
const front = makeWall((w,h) => roundedFlapShape(w, h, 0.4), W, flapH, new THREE.Vector3(0, 0, D / 2), 0, true);
const back  = makeWall((w,h) => roundedFlapShape(w, h, 0.4), W, flapH, new THREE.Vector3(0, 0, -D / 2), Math.PI, false);
const left  = makeWall(sideWallShape, D, H, new THREE.Vector3(-W / 2, 0, 0), Math.PI / 2, false);
const right = makeWall(sideWallShape, D, H, new THREE.Vector3(W / 2, 0, 0), -Math.PI / 2, false);

// ---- fold state: ONE number t drives every wall. All walls use the SAME angle formula. ----
const state = { t: 0 };
function updateFold() {
  const angle = -Math.PI / 2 * state.t;
  front.foldGroup.rotation.x = angle;
  back.foldGroup.rotation.x = angle;
  left.foldGroup.rotation.x = angle;
  right.foldGroup.rotation.x = angle;
}
updateFold();

// ---- smooth animate for buttons ----
let animating = false;
function animateTo(target, duration = 1200) {
  if (animating) return;
  animating = true;
  const start = state.t;
  const startTime = performance.now();
  function step(now) {
    const p = Math.min((now - startTime) / duration, 1);
    const eased = p < 0.5 ? 2 * p * p : -1 + (4 - 2 * p) * p;
    state.t = start + (target - start) * eased;
    updateFold();
    if (p < 1) requestAnimationFrame(step);
    else animating = false;
  }
  requestAnimationFrame(step);
}

document.getElementById("openBtn").addEventListener("click", () => animateTo(0));
document.getElementById("closeBtn").addEventListener("click", () => animateTo(1));
document.getElementById("resetBtn").addEventListener("click", () => {
  state.t = 0;
  updateFold();
  camera.position.set(0, 8, 10);
  controls.target.set(0, 1, 0);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
