<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mailer Box - Dieline to 3D</title>
<style>
  body { margin: 0; overflow: hidden; background: #f0ede8; font-family: sans-serif; }
  #ui {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 14px; z-index: 10;
  }
  button {
    padding: 12px 24px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px;
    cursor: pointer; color: white; box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  }
  #openBtn { background: #e67e22; }
  #closeBtn { background: #27ae60; }
  #resetBtn { background: #2980b9; }
  button:hover { filter: brightness(1.1); }
</style>
</head>
<body>

<div id="ui">
  <button id="openBtn">Open</button>
  <button id="closeBtn">Close</button>
  <button id="resetBtn">Reset</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0ede8);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 9, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.55);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// ---- colors ----
const KRAFT_OUT = 0xa9702f;
const KRAFT_IN = 0xd4b483;
const GREY = 0xcfc9c0;

const outerMat = new THREE.MeshStandardMaterial({ color: KRAFT_OUT, side: THREE.FrontSide });
const innerMat = new THREE.MeshStandardMaterial({ color: KRAFT_IN, side: THREE.FrontSide });
const greyMat = new THREE.MeshStandardMaterial({ color: GREY, side: THREE.FrontSide });

// label texture for the front flap
function makeLabelTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#a9702f";
  ctx.fillRect(0, 0, 512, 512);
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 54px Georgia";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Hemasree", 256, 256);
  return new THREE.CanvasTexture(canvas);
}
const labelMat = new THREE.MeshStandardMaterial({ map: makeLabelTexture(), side: THREE.FrontSide });

const W = 3.4, D = 3.4;   // box footprint
const H = 1.2;            // wall height
const flapBulge = 0.4;    // rounded flap bulge above wall height

// ---- rounded flap panel shape (wall + curved flap on top) ----
function roundedFlapShape(width, height, bulge) {
  const shape = new THREE.Shape();
  const hw = width / 2;
  shape.moveTo(-hw, 0);
  shape.lineTo(-hw, height);
  shape.quadraticCurveTo(-hw, height + bulge, -hw * 0.3, height + bulge * 0.9);
  shape.quadraticCurveTo(0, height + bulge * 1.15, hw * 0.3, height + bulge * 0.9);
  shape.quadraticCurveTo(hw, height + bulge, hw, height);
  shape.lineTo(hw, 0);
  shape.lineTo(-hw, 0);
  return shape;
}

// wall builder: outerGroup = fixed placement, foldGroup = the hinge that rotates
function makeWall(width, height, edgePos, staticYRotation, useLabel) {
  const outerGroup = new THREE.Group();
  outerGroup.position.copy(edgePos);
  outerGroup.rotation.y = staticYRotation;
  scene.add(outerGroup);

  const foldGroup = new THREE.Group();
  outerGroup.add(foldGroup);

  const shape = roundedFlapShape(width, height, flapBulge);
  const outerGeo = new THREE.ShapeGeometry(shape);
  const outerMesh = new THREE.Mesh(outerGeo, useLabel ? labelMat : outerMat);
  outerMesh.rotation.x = Math.PI / 2;

  const innerGeo = new THREE.ShapeGeometry(shape);
  innerGeo.translate(0, 0, 0.01);
  const innerMesh = new THREE.Mesh(innerGeo, innerMat);
  innerMesh.rotation.x = Math.PI / 2;
  innerMesh.rotation.z = Math.PI;

  foldGroup.add(outerMesh);
  foldGroup.add(innerMesh);

  return { foldGroup };
}

// ---- bottom (fixed) ----
const bottom = new THREE.Mesh(new THREE.PlaneGeometry(W, D), greyMat);
bottom.rotation.x = -Math.PI / 2;
scene.add(bottom);

const front = makeWall(W, H, new THREE.Vector3(0, 0, D / 2), 0, true);
const back  = makeWall(W, H, new THREE.Vector3(0, 0, -D / 2), Math.PI, false);
const left  = makeWall(D, H, new THREE.Vector3(-W / 2, 0, 0), Math.PI / 2, false);
const right = makeWall(D, H, new THREE.Vector3(W / 2, 0, 0), -Math.PI / 2, false);

// ---- fold state: one number t (0=flat, 1=closed) drives every wall ----
const state = { t: 0 };
function updateFold() {
  const angle = -Math.PI / 2 * state.t;
  front.foldGroup.rotation.x = angle;
  back.foldGroup.rotation.x = angle;
  left.foldGroup.rotation.x = angle;
  right.foldGroup.rotation.x = angle;
}
updateFold();

// ---- smooth animate for buttons ----
let animating = false;
function animateTo(target, duration = 1200) {
  if (animating) return;
  animating = true;
  const start = state.t;
  const startTime = performance.now();
  function step(now) {
    const p = Math.min((now - startTime) / duration, 1);
    const eased = p < 0.5 ? 2 * p * p : -1 + (4 - 2 * p) * p;
    state.t = start + (target - start) * eased;
    updateFold();
    if (p < 1) requestAnimationFrame(step);
    else animating = false;
  }
  requestAnimationFrame(step);
}

document.getElementById("openBtn").addEventListener("click", () => animateTo(0));
document.getElementById("closeBtn").addEventListener("click", () => animateTo(1));
document.getElementById("resetBtn").addEventListener("click", () => {
  state.t = 0;
  updateFold();
  camera.position.set(0, 9, 12);
  controls.target.set(0, 1, 0);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
